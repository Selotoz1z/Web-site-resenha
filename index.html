<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <style>
    header{
        background-color: #1D426A;
        color: #FBFBFB;
        text-align: center;
        max-width: 500px;
        margin: auto; 
        padding: 16px;
    }
    main{
        background-color:white;
        color:#1D426A;
        max-width: 500px;
        margin: auto; 
        padding: 16px;
        
    }
    article{
display: flex;
    }
    img{
        width: 80px;
        height: 80px;
    }
    .artigo-autor{
        font-weight: bold;
    }
    </style>
</head>
<body>
    <header>
        <h1>Blog sobre tecnologia</h1>
        <p>Vou falar sobre tecnologia e programação</p>
    </header>
    <main>
        <article>
            <img src="LGBIF.jpg" alt="Desenvolvimento de software e aplicativos mobile com tecnologias modernas">
        <div>
        <h2>Meu primeiro post</h2>
        <p class="artigo-autor">Por: Seloto</p>
        <p>Bem vindo ao meu site, aqui falaremos sobre programação</p>
        <button>💜 <span>0</span></button>
        <button>🖤 <span>0</span></button>
        </div>
        </article>
        <article>
             <img src="LGBIF.jpg" alt="Desenvolvimento de software e aplicativos mobile com tecnologias modernas">
        <div>
        <h2>Meu segundo post</h2>
        <p class="artigo-autor">Por: Seloto</p>
        <p>Bem vindo ao meu site, aqui falaremos sobre programação</p>
        <button>💜 <span>0</span></button>
        <button>🖤 <span>0</span></button>
        </div>
        </article>
        
    </main>
</body>
<script>
    const botoes = document.querySelectorAll("button");

    botoes.forEach( function(botao){
        let curtiu = false;
    botao.addEventListener("click", botaoClicado);
    function botaoClicado(){
        console.log("fui clicado");
        let texto = botao.querySelector("span");
        if (curtiu === false) {
        texto.textContent++;
        curtiu = true;
        } else{
        texto.textContent--;
        curtiu = false;
        }
    }
} )
   

    

</script>
</html>
